name: Create Release Zip

on:
  release:
    types:
      - created

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Create Zip
        run: |
          # Replace the following command with your script to create the .zip file
          zip -r release.zip path/to/your/files

      - name: Upload Zip
        uses: actions/upload-artifact@v2
        with:
          name: release
          path: release.zip
